<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="RealHomes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2339" />
      <stop offset="1" stop-color="#1B3A5C" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8BC64" />
      <stop offset="1" stop-color="#C9962C" />
    </linearGradient>
  </defs>

  <!-- Navy rounded-square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" />
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="rgba(232,188,100,0.35)" stroke-width="2" />

  <!-- Crown mark -->
  <g transform="translate(12 14)">
    <!-- tips -->
    <circle cx="8" cy="8" r="2.2" fill="#E8BC64" />
    <circle cx="20" cy="4.5" r="2.6" fill="#E8BC64" />
    <circle cx="32" cy="8" r="2.2" fill="#E8BC64" />

    <!-- crown spikes -->
    <path
      d="M6 26 L9.2 10.5 L16.5 18.2 L20 7.8 L23.5 18.2 L30.8 10.5 L34 26 Z"
      fill="url(#gold)"
      stroke="#A07820"
      stroke-width="1.2"
      stroke-linejoin="round"
    />

    <!-- base -->
    <rect x="6.5" y="26" width="27" height="10" rx="4.5" fill="url(#gold)" stroke="#A07820" stroke-width="1.2" />

    <!-- subtle highlight -->
    <path
      d="M9.5 28.5 H30.5"
      stroke="rgba(255,255,255,0.35)"
      stroke-width="1.4"
      stroke-linecap="round"
    />
  </g>
</svg>

